{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mb-5 position-relative z-3">
    <div class="col-lg-8">
        <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-end mb-4 gap-3">
            <div><h2 class="fw-bold text-secondary-custom mb-2"><i class="fa-solid fa-wand-magic-sparkles text-primary-custom me-2"></i>UI 渲染引擎</h2><p class="text-muted m-0">深度定制系统外观参数，完美兼容昼夜双擎与多端尺寸。</p></div>
            <form action="/admin/reset_settings" method="POST"><button type="submit" class="btn btn-outline-danger fw-bold rounded-pill px-4 shadow-sm w-100" onclick="return confirm('确定要恢复出厂 UI 设置吗？此操作不可逆。')"><i class="fa-solid fa-rotate-left me-2"></i>重置默认</button></form>
        </div>
        <div class="surface-card-static p-4 p-md-5 mb-5 border-0">
            <form action="/admin/ui_settings" method="POST">
                <h5 class="fw-bold text-secondary-custom border-bottom border-light pb-3 mb-4">基础参数与标识</h5>
                <div class="row mb-4">
                    <div class="col-md-12 mb-3"><label class="form-label fw-bold text-secondary-custom small">系统展示名 (Site Title)</label><input type="text" name="site_title" class="form-control" value="{{ g_settings.site_title }}" required></div>
                    <div class="col-md-12 mb-3"><label class="form-label fw-bold text-secondary-custom small">标签页图标 (Favicon URL)</label><div class="d-flex align-items-center"><img src="{{ g_settings.favicon_url or 'https://cdn-icons-png.flaticon.com/512/3208/3208903.png' }}" class="rounded me-3 shadow-sm border border-light flex-shrink-0" style="width: 40px; height: 40px; object-fit: cover;"><input type="url" name="favicon_url" class="form-control" value="{{ g_settings.favicon_url }}" placeholder="输入 .png 或 .ico 链接" required></div></div>
                    <div class="col-md-12"><label class="form-label fw-bold text-secondary-custom small">沉浸式背景图 (Background URL)</label><input type="url" name="bg_image" class="form-control" value="{{ g_settings.bg_image }}"><div class="form-text mt-2 text-muted small"><i class="fa-solid fa-circle-info me-1"></i>留空则使用下方配置的纯色底色。</div></div>
                </div>
                <h5 class="fw-bold text-secondary-custom border-bottom border-light pb-3 mb-4 mt-5">色彩重塑</h5>
                <div class="row mb-4">
                    <div class="col-6 col-md-3 mb-3"><label class="form-label fw-bold text-secondary-custom small">主色调 (Primary)</label><input type="color" name="primary_color" class="form-control form-control-color w-100 p-2" value="{{ g_settings.primary_color }}" required></div>
                    <div class="col-6 col-md-3 mb-3"><label class="form-label fw-bold text-secondary-custom small">辅色调 (Secondary)</label><input type="color" name="secondary_color" class="form-control form-control-color w-100 p-2" value="{{ g_settings.secondary_color }}" required></div>
                    <div class="col-6 col-md-3 mb-3"><label class="form-label fw-bold text-secondary-custom small">页面底色 (Bg)</label><input type="color" name="bg_color" class="form-control form-control-color w-100 p-2" value="{{ g_settings.bg_color }}" required></div>
                    <div class="col-6 col-md-3 mb-3"><label class="form-label fw-bold text-secondary-custom small">卡片底色 (Card)</label><input type="color" name="card_bg" class="form-control form-control-color w-100 p-2" value="{{ g_settings.card_bg }}" required></div>
                    <div class="col-12 col-md-4 mt-2"><label class="form-label fw-bold text-secondary-custom small">正文颜色 (Text)</label><input type="color" name="text_color" class="form-control form-control-color w-100 p-2" value="{{ g_settings.text_color }}" required></div>
                </div>
                <h5 class="fw-bold text-secondary-custom border-bottom border-light pb-3 mb-4 mt-5">几何与光影</h5>
                <div class="row mb-5">
                    <div class="col-md-6 mb-4 mb-md-0"><label class="form-label fw-bold text-secondary-custom small d-flex justify-content-between"><span>卡片圆角曲率 (px)</span> <span class="text-primary-custom">{{ g_settings.border_radius }}px</span></label><input type="range" name="border_radius" class="form-range" min="0" max="40" step="1" value="{{ g_settings.border_radius }}" oninput="this.previousElementSibling.querySelector('span:last-child').innerText = this.value + 'px'"></div>
                    <div class="col-md-6"><label class="form-label fw-bold text-secondary-custom small d-flex justify-content-between"><span>阴影弥散度 (Opacity)</span> <span class="text-primary-custom">{{ g_settings.shadow_opacity }}</span></label><input type="range" name="shadow_opacity" class="form-range" min="0" max="0.2" step="0.01" value="{{ g_settings.shadow_opacity }}" oninput="this.previousElementSibling.querySelector('span:last-child').innerText = this.value"></div>
                </div>
                <hr class="border-light my-4">
                <button type="submit" class="btn btn-theme-primary btn-lg w-100 rounded-pill py-3 fs-5 shadow-sm"><i class="fa-solid fa-paintbrush me-2"></i>编译并执行全站重绘</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
