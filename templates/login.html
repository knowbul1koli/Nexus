{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-center align-items-center w-100 position-relative z-3" style="min-height: 75vh;">
    <div class="surface-card-static p-4 p-md-5 mx-3" style="width: 100%; max-width: 450px;">
        <div class="text-center mb-5">
            <div class="surface-card rounded-circle d-inline-flex justify-content-center align-items-center mb-3" style="width: 65px; height: 65px;"><i class="fa-solid fa-shield-halved text-primary-custom fs-3"></i></div>
            <h3 class="fw-bold text-secondary-custom">登录系统</h3>
            <p class="text-muted small">验证身份信息以进入控制台</p>
        </div>
        <form method="POST" action="/login">
            <div class="mb-4">
                <label class="form-label fw-bold text-secondary-custom small ms-1">注册邮箱</label>
                <input type="email" name="email" class="form-control form-control-lg" required placeholder="例如：expert@domain.com">
            </div>
            <div class="mb-5">
                <label class="form-label fw-bold text-secondary-custom small ms-1">安全密码</label>
                <div class="position-relative">
                    <input type="password" id="loginPw" name="password" class="form-control form-control-lg pe-5" required placeholder="输入密码">
                    <i class="fa-solid fa-eye position-absolute pw-toggle-icon" onclick="togglePassword('loginPw', this)"></i>
                </div>
            </div>
            <button type="submit" class="btn btn-theme-primary w-100 py-3 fs-5 rounded-3 shadow-sm">登 录</button>
        </form>
        <div class="text-center mt-5"><span class="text-muted small">没有账户？</span> <a href="/register" class="text-decoration-none fw-bold text-primary-custom">注册账户</a></div>
    </div>
</div>
{% endblock %}
